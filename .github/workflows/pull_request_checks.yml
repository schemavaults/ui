name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - claude/*
      - feature/*
      - fix/*
      - bug/*

env:
  BUN_VERSION: 1.3.14

permissions:
  packages: read

jobs:
  Lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Configure bun to install from GitHub Packages
        run: rm -rf .npmrc
      - name: Install dependencies
        run: bun install
        env:
          SCHEMAVAULTS_GITHUB_PACKAGE_REGISTRY_USER: ${{ github.actor }}
          SCHEMAVAULTS_GITHUB_PACKAGE_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Lint
        run: bun run lint

  Typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Configure bun to install from GitHub Packages
        run: rm -rf .npmrc
      - name: Install dependencies
        run: bun install
        env:
          SCHEMAVAULTS_GITHUB_PACKAGE_REGISTRY_USER: ${{ github.actor }}
          SCHEMAVAULTS_GITHUB_PACKAGE_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Typecheck
        run: bun run typecheck

  Build:
    name: Build
    needs:
      - Lint
      - Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Configure bun to install from GitHub Packages
        run: rm -rf .npmrc
      - name: Install dependencies
        run: bun install
        env:
          SCHEMAVAULTS_GITHUB_PACKAGE_REGISTRY_USER: ${{ github.actor }}
          SCHEMAVAULTS_GITHUB_PACKAGE_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: bun run build

  Storybook-Tests:
    name: Storybook Tests
    needs:
      - Lint
      - Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - name: Configure bun to install from GitHub Packages
        run: rm -rf .npmrc
      - name: Install dependencies
        run: bun install
        env:
          SCHEMAVAULTS_GITHUB_PACKAGE_REGISTRY_USER: ${{ github.actor }}
          SCHEMAVAULTS_GITHUB_PACKAGE_REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Install Playwright Chromium (with system deps)
        run: bunx playwright install --with-deps chromium
      - name: Build Storybook
        run: bun run build:storybook
      - name: Run Storybook tests (interaction + smoke)
        run: bun run test-storybook:ci
